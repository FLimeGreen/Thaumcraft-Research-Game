<div class="flex gap-4 p-2 bg-gray-900 border border-gray-300 text-white h-64 overflow-y-auto">

  <table class="border-collapse border border-gray-300">
    <thead>
      <tr>
        <th class="border border-gray-300 px-4 py-2 text-left">Menge</th>
        <th class="border border-gray-300 px-4 py-2 text-left">Aspect</th>
      </tr>
    </thead>
    <tbody>
        <tr
        [class.border-blue-500]="researchFieldService.SelectedAspectInventory === null"
        [class.border-gray-300]="researchFieldService.SelectedAspectInventory !== null"

        [class.border-3]="researchFieldService.SelectedAspectInventory === null"
        [class.border]="researchFieldService.SelectedAspectInventory !== null"
        >
            <th class="border border-gray-300">-</th>
            <td class="border border-gray-300 p-2">
                <button class="border border-gray-300"
                (click)="onClearClick()"
                >
                  Entfernen
                </button>
            </td>
        </tr>
        <tr *ngFor="let obj of inventoryPrimal(); let i = index"
        [class.border-blue-500]="researchFieldService.SelectedAspectInventory === obj.aspect"
        [class.border-gray-300]="researchFieldService.SelectedAspectInventory !== obj.aspect"

        [class.border-3]="researchFieldService.SelectedAspectInventory === obj.aspect"
        [class.border]="researchFieldService.SelectedAspectInventory !== obj.aspect"

        (click)="onInventoryClick(obj.aspect)"
        >
            <th class="border border-gray-300">{{ obj.count }}</th>
            <td class="border border-gray-300">
            <img class="w-16 h-16" [src]="obj.aspect.IMG" alt="Hex Field Image">
            </td>
        </tr>
    </tbody>
  </table>

  <app-research-inventory-field-table [inventory]="inventoryLevel1"></app-research-inventory-field-table>
  <app-research-inventory-field-table [inventory]="inventoryLevel2"></app-research-inventory-field-table>
  <app-research-inventory-field-table [inventory]="inventoryLevel3"></app-research-inventory-field-table>

  <div class="flex flex-col">
    <app-research-inventory-field-table [inventory]="inventoryLevel4"></app-research-inventory-field-table>
    <app-research-inventory-field-table class="mt-4" [inventory]="inventoryLevel5"></app-research-inventory-field-table>
  </div>

  <app-research-inventory-field-table [inventory]="inventoryLevel6"></app-research-inventory-field-table>
  <app-research-inventory-field-table [inventory]="inventoryLevel7"></app-research-inventory-field-table>
</div>
