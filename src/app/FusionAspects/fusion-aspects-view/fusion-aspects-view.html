<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 h-full bg-gray-400 border-r border-gray-300 flex flex-col p-4 gap-4 overflow-y-auto">
    <!-- Inhalt hier -->
    <ng-content>

    <app-gold-rank-display></app-gold-rank-display>

    </ng-content>
  </aside>

  <!-- Hauptinhalt -->
  <main class="flex-1 overflow-y-auto p-4 bg-gray-900">
    <ng-content>

      <app-research-inventory-field></app-research-inventory-field>

      <div class="flex items-center gap-4">

        <!-- Box 1 -->
        <div class="border border-gray-300 rounded p-4 bg-white">
          <ng-content select="[left1]"></ng-content>
        </div>

        <!-- Plus -->
        <div class="text-gray-500 text-2xl">+</div>

        <!-- Box 2 -->
        <div class="border border-gray-300 rounded p-4 bg-white">
          <ng-content select="[left2]"></ng-content>
        </div>

        <!-- Pfeil -->
        <div class="text-gray-500 text-2xl">→</div>

        <!-- Box 3 -->
        <div class="border border-gray-300 rounded p-4 bg-white">
          <ng-content select="[right]"></ng-content>
        </div>

      </div>
    </ng-content>
  </main>

</div>
