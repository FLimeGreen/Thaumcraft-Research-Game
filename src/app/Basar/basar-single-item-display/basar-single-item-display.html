<div class="flex flex-wrap gap-4">
  <div
    *ngFor="let item of ShopItems()"
    class="rounded p-4 text-white"
    [class.border-blue-500]="basarservice.SelectedItem === item"
    [class.border-gray-300]="basarservice.SelectedItem !== item"

    [class.border-3]="basarservice.SelectedItem === item"
    [class.border]="basarservice.SelectedItem !== item"

    [class.bg-gray-900]="item.gekauft"
    [class.bg-gray-600]="!item.gekauft"

    (click)="onItemClick(item)"
  >
    <p class="text-center">{{ item.aspect.constructor.name }}</p>
    <img
      class="border border-gray-300 p-2 w-16 h-16"
      [src]="item.aspect.IMG"
      alt="Shop Item"
    >
    <p>Amount: {{ item.amount }}</p>
    <p>Price: {{ item.preis }}</p>
  </div>
</div>
